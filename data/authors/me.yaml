bio: |
  I am an H. Milton Stewart Postdoctoral Fellow in the [H. Milton Stewart School of Industrial and Systems Engineering (ISyE)](https://www.isye.gatech.edu/) at [Georgia Institute of Technology](https://www.gatech.edu/). My postdoctoral mentor is [Prof. Guanghui (George) Lan](https://sites.gatech.edu/guanghui-lan/).

  I earned my Ph.D. in [Industrial Engineering](https://engineering.purdue.edu/IE) at [Purdue University](https://www.purdue.edu/) (2024). Prior to that, I received my B.S. (2016) and M.S. (2019) degrees in the [School of Mathematical Sciences](https://english.bnu.edu.cn/schoolsdepartments/byx/113297.htm) from [Beijing Normal University](https://english.bnu.edu.cn/).

