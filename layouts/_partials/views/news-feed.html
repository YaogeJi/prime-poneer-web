{{ $item := .item }}
{{ $displayDate := $item.Params.event_start | default $item.Date }}
{{ $summary := partial "functions/get_summary" $item }}

<a href="{{ $item.RelPermalink }}" class="group block py-4 first:pt-0 last:pb-0 hover:bg-zinc-50 dark:hover:bg-zinc-800/30 -mx-3 px-3 rounded-lg transition-colors duration-150">
  <div class="flex items-start gap-4">
    <time class="flex-shrink-0 text-sm font-medium text-zinc-400 dark:text-zinc-500 tabular-nums pt-0.5 w-24"
          datetime="{{ time.Format "2006-01-02" $displayDate }}">
      {{ time.Format "Jan 2, 2006" $displayDate }}
    </time>
    <div class="min-w-0 flex-1">
      <h3 class="text-base font-semibold text-zinc-900 dark:text-zinc-100 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors leading-snug">
        {{ $item.Title }}
      </h3>
      <p class="mt-1 text-sm text-zinc-500 dark:text-zinc-400 line-clamp-1">
        {{ $summary | plainify | truncate 120 }}
      </p>
    </div>
    <svg class="flex-shrink-0 w-4 h-4 text-zinc-300 dark:text-zinc-600 group-hover:text-primary-500 transition-colors mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
  </div>
</a>
