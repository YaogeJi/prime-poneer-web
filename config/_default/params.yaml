hugoblox:
  schema: "2.0"

  identity:
    name: "Yao Ji"
    organization: ""
    type: person
    tagline: "H. Milton Stewart Postdoctoral Fellow at Georgia Tech"
    description: "Yao Ji - Postdoctoral Fellow at Georgia Tech ISyE, Ph.D. in Operation Research from Purdue University."
    social: {}

  theme:
    mode: system
    pack: "default"
    colors:
      primary: "#0f4c75"
      secondary: "#3282b8"
      neutral: ""
    colors_light:
      background: "#dce9f3"
      surface: "#f0f7fc"
      on_background: "#0a2540"
    colors_dark:
      background: "#1a3a5c"
      surface: "#1e4670"
      on_background: "#e2e8f0"
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  typography:
    font: "native"
    size: "md"

  layout:
    radius: "md"
    spacing: "comfortable"
    avatar_shape: circle

  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: false
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    cta:
      enable: false
      text: ""
      url: ""

  footer:
    style: minimal
    language_switcher: false
    text: ""

  copyright:
    notice: "© {year} Yao Ji"
    license:
      type: cc
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  seo:
    title: "Yao Ji"
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    ai:
      allow:
        - /
      disallow: []
      note: ""
      contact: ""

  content:
    math:
      enable: false
    toc:
      enable: true
    reading_time:
      enable: true
    citations:
      style: apa

  search:
    enable: true
    suggestions: []
    quick_actions: []

  comments:
    enable: false
    provider: ""
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  analytics:
    google:
      measurement_id: ""
    google_tag_manager:
      container_id: ""
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  repository:
    enable: false
    url: ""
    branch: main
    content_dir: content

  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow
    permissions_policy: ""

  privacy:
    enable: false
    anonymize_analytics: true

  debug:
    enable: false
    hud:
      position: bottom-left
      opacity: 1.0
    export_logs: true

  pro:
    hide_attribution: false
